# Docker Compose for Zond Topological Integration Testing
# Simulates LAN discovery, multi-NIC usage, and Routed segments.

services:
  scanner:
    build:
      context: .
      dockerfile: docker/scanner/Dockerfile
    container_name: zond-integration-scanner
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - lan_network
      - extra_network
    environment:
      - ZOND_LOG=trace

  gateway:
    image: debian:bookworm-slim
    container_name: zond-gateway
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apt-get update && apt-get install -y iproute2 iptables &&
             echo 1 > /proc/sys/net/ipv4/ip_forward &&
             iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE &&
             tail -f /dev/null"
    networks:
      - lan_network
      - isolated_network

  target-lan:
    build:
      context: .
      dockerfile: docker/targets/Dockerfile
    container_name: zond-target-lan
    cap_add:
      - NET_ADMIN
    networks:
      - lan_network

  target-extra:
    build:
      context: .
      dockerfile: docker/targets/Dockerfile
    container_name: zond-target-extra
    cap_add:
      - NET_ADMIN
    networks:
      - extra_network

  target-isolated:
    build:
      context: .
      dockerfile: docker/targets/Dockerfile
    container_name: zond-target-isolated
    cap_add:
      - NET_ADMIN
    networks:
      - isolated_network

networks:
  lan_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  extra_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
  isolated_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
